<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crack the Code!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #dbeafe;
      margin: 0;
      padding: 20px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      color: #1e40af;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .back-link:hover { text-decoration: underline; }

    /* ── Input form ── */
    .form-card {
      background: white;
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 580px;
      margin: 0 auto 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }

    .form-card h1 {
      margin: 0 0 6px;
      color: #1e40af;
      font-size: 26px;
    }

    .form-card p {
      color: #555;
      margin: 0 0 18px;
      font-size: 14px;
    }

    .form-card label {
      display: block;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .form-card input[type="text"] {
      flex: 1;
      padding: 10px 13px;
      font-size: 16px;
      border: 2px solid #bcd;
      border-radius: 8px;
      outline: none;
    }

    .form-card input[type="text"]:focus { border-color: #1e40af; }

    .btn-generate {
      background: #1e40af;
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-generate:hover { background: #1e3a8a; }

    .form-optional {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .form-optional label {
      font-weight: normal;
      color: #666;
    }

    .form-optional input[type="text"] {
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
    }

    .form-optional-field { flex: 1; }

    .print-row {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn-print {
      display: none;
      background: #15803d;
      color: white;
      border: none;
      padding: 10px 26px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-print:hover { background: #166534; }

    /* ── Worksheet ── */
    #worksheet {
      display: none;
      background: white;
      padding: 32px 36px;
      max-width: 820px;
      margin: 0 auto;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }

    #worksheet.visible { display: block; }

    .ws-title {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      color: #1e40af;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* ── Cipher key (two-row table across the top:
          numbers on row 1, letters on row 2, column-aligned) ── */
    .cipher-top {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: auto auto;
      grid-auto-columns: minmax(22px, 1fr);
      border: 2px solid #1e40af;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .cipher-top span {
      text-align: center;
      padding: 6px 3px;
      font-weight: bold;
      border-right: 1px solid #bfdbfe;
    }

    /* last column gets no trailing divider */
    .cipher-top span:nth-last-child(-n+2) { border-right: none; }

    .cipher-top .cn {
      font-size: 14px;
      color: #1e40af;
      border-bottom: 1px solid #bfdbfe;
    }

    .cipher-top .cl {
      font-size: 16px;
      color: #111;
    }

    /* ── Message grid ── */
    .message-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 28px 52px;
      align-items: flex-start;
    }

    .word-group {
      display: flex;
      gap: 6px;
    }

    /* ── Letter boxes ──
       Use flex-direction:column with flex-basis on each row so heights
       are rock-solid in print (bare `height` can collapse on empty elements). */
    .letter-box {
      width: 62px;
      border: 2px solid #374151;
      border-radius: 5px;
      overflow: hidden;
      text-align: center;
      display: flex;
      flex-direction: column;
    }

    .lb-problem {
      flex: 0 0 auto;
      min-height: 26px;
      border-bottom: 2px solid #374151;
      padding: 3px 2px;
      font-size: 13px;
      font-weight: bold;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-num {
      flex: 0 0 28px;
      height: 28px;
      border-bottom: 2px solid #374151;
    }

    .lb-letter {
      flex: 0 0 38px;
      height: 38px;
    }

    /* ── Mobile (screen preview only — print uses page-width, so these
          max-width rules never apply when printing) ── */
    @media (max-width: 640px) {
      body { padding: 10px; }
      .form-card { padding: 16px 18px; }

      #worksheet { padding: 16px 10px; }
      .ws-title { font-size: 30px; margin-bottom: 14px; }

      /* let the key shrink all its columns to fit the screen width */
      .cipher-top { grid-auto-columns: minmax(0, 1fr); margin-bottom: 16px; }
      .cipher-top span { padding: 4px 1px; }
      .cipher-top .cn { font-size: 12px; }
      .cipher-top .cl { font-size: 15px; }

      /* tighter gaps + smaller boxes so word groups fit without scrolling */
      .message-grid { gap: 16px 20px; }
      .word-group { gap: 4px; }
      .letter-box { width: 42px; }
      .lb-problem { font-size: 11px; min-height: 22px; padding: 2px 1px; }
      .lb-num { flex-basis: 24px; height: 24px; }
      .lb-letter { flex-basis: 32px; height: 32px; }
    }

    /* ── Print ── */
    @media print {
      @page { size: 8.5in 11in; margin: 0.6in; }
      body { background: white; padding: 0; margin: 0; }
      .back-link,
      .form-card,
      .print-row { display: none !important; }
      #worksheet {
        display: block !important;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
        max-width: 100%;
        width: 100%;
      }
      /* Fixed box sizes — identical on screen and paper. A long phrase simply
         flows onto another page (break-inside:avoid keeps each box whole). */
      .lb-problem { flex: 0 0 auto !important; min-height: 26px !important; }
      .lb-num     { flex: 0 0 28px !important; height: 28px !important; }
      .lb-letter  { flex: 0 0 38px !important; height: 38px !important; }
      .word-group { break-inside: avoid; }
      .letter-box { break-inside: avoid; }
    }
  </style>
</head>
<body>

<a class="back-link" href="/">← Back to Dixie's Page</a>

<!-- ── Input form ── -->
<div class="form-card">
  <h1>Crack the Code!</h1>
  <p>Type a secret phrase to generate a printable math puzzle.</p>

  <label for="phrase-input">Secret phrase</label>
  <div class="form-row">
    <input type="text" id="phrase-input"
           placeholder="e.g. Treasure is in the backyard"
           onkeydown="if(event.key==='Enter') generate()" />
    <button class="btn-generate" onclick="generate()">Generate</button>
  </div>

  <div class="form-optional">
    <div class="form-optional-field">
      <label for="title-input">Puzzle title (optional)</label>
      <input type="text" id="title-input" placeholder="Crack the Code!" />
    </div>
  </div>
</div>

<div class="print-row">
  <button class="btn-print" id="print-btn" onclick="window.print()">Print</button>
</div>

<div id="worksheet"></div>

<script>
function rng(lo, hi) {
  return Math.floor(Math.random() * (hi - lo + 1)) + lo;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rng(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


// Rules:
//   • Prefer both operands single-digit (1–9)
//   • Fallback: one operand two-digit if target > 18; never both two-digit
//   • No negatives; operands always ≥ 1
function makeProblem(target) {
  const single = [];
  const mixed  = [];

  // Addition: a + b = target
  for (let a = 1; a <= target - 1; a++) {
    const b = target - a;
    if (b < 1) continue;
    if (a <= 9 && b <= 9)      single.push(`${a} + ${b}`);
    else if (a <= 9 || b <= 9) mixed.push(`${Math.min(a,b)} + ${Math.max(a,b)}`);
  }

  // Subtraction: (target + b) - b = target, b single-digit
  for (let b = 1; b <= 9; b++) {
    const a = target + b;
    if (a > 99) break;
    if (a <= 9) single.push(`${a} - ${b}`);
    else        mixed.push(`${a} - ${b}`);
  }

  const pool = single.length ? single : mixed;
  if (!pool.length) return `${target}`;
  shuffle(pool);
  return pool[0];
}

function generate() {
  const raw = document.getElementById('phrase-input').value.trim().toUpperCase();
  if (!raw) { alert('Please enter a secret phrase!'); return; }

  const phrase = raw.split('').filter(c => /[A-Z ]/.test(c)).join('').trim();
  const words  = phrase.split(/\s+/).filter(Boolean);
  if (!words.length) { alert('Phrase must contain letters.'); return; }

  // Scrambled cipher — only letters in this phrase, 1..N
  const uniqueLetters = [...new Set(words.join('').split(''))].sort();
  shuffle(uniqueLetters);

  const letterToNum = {};
  uniqueLetters.forEach((ch, i) => { letterToNum[ch] = i + 1; });

  // Sorted by number for the sidebar display
  const cipherPairs = uniqueLetters.map((ch, i) => [i + 1, ch]).sort((a, b) => a[0] - b[0]);

  const n = uniqueLetters.length;
  const titleVal = document.getElementById('title-input').value.trim() || 'Crack the Code!';

  // ── Cipher key (two-row table: numbers on top, letters below) ──
  const cipherTopHTML = `
    <div class="cipher-top">
      ${cipherPairs.map(([num, letter]) =>
        `<span class="cn">${num}</span><span class="cl">${letter}</span>`
      ).join('')}
    </div>`;

  // ── Word/letter boxes ──
  const gridHTML = `<div class="message-grid">` +
    words.map(word =>
      `<div class="word-group">` +
      word.split('').map(ch => {
        const num = letterToNum[ch];
        const problem = makeProblem(num);
        return `<div class="letter-box">
          <div class="lb-problem">${problem}</div>
          <div class="lb-num">&nbsp;</div>
          <div class="lb-letter">&nbsp;</div>
        </div>`;
      }).join('') +
      `</div>`
    ).join('') +
  `</div>`;

  document.getElementById('worksheet').innerHTML = `
    <div class="ws-title">${escHtml(titleVal)}</div>
    ${cipherTopHTML}
    ${gridHTML}`;

  const ws = document.getElementById('worksheet');
  ws.classList.add('visible');
  document.getElementById('print-btn').style.display = 'inline-block';
  ws.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
