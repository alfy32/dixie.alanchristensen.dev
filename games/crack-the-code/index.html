<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crack the Code!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #dbeafe;
      margin: 0;
      padding: 20px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      color: #1e40af;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .back-link:hover { text-decoration: underline; }

    /* ── Input form ── */
    .form-card {
      background: white;
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 580px;
      margin: 0 auto 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }

    .form-card h1 {
      margin: 0 0 6px;
      color: #1e40af;
      font-size: 26px;
    }

    .form-card p {
      color: #555;
      margin: 0 0 18px;
      font-size: 14px;
    }

    .form-card label {
      display: block;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .form-card input[type="text"] {
      flex: 1;
      padding: 10px 13px;
      font-size: 16px;
      border: 2px solid #bcd;
      border-radius: 8px;
      outline: none;
    }

    .form-card input[type="text"]:focus { border-color: #1e40af; }

    .btn-generate {
      background: #1e40af;
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-generate:hover { background: #1e3a8a; }

    .form-optional {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .form-optional label {
      font-weight: normal;
      color: #666;
    }

    .form-optional input[type="text"] {
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
    }

    .form-optional-field { flex: 1; }

    .print-row {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn-print {
      display: none;
      background: #15803d;
      color: white;
      border: none;
      padding: 10px 26px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-print:hover { background: #166534; }

    /* ── Worksheet ── */
    #worksheet {
      display: none;
      background: white;
      padding: 36px 40px;
      max-width: 820px;
      margin: 0 auto;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }

    #worksheet.visible { display: block; }

    .ws-title {
      text-align: center;
      font-size: 44px;
      font-weight: bold;
      color: #1e40af;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    /* ── Two-column body ── */
    .ws-body {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    /* ── Cipher sidebar ── */
    .cipher-sidebar {
      flex-shrink: 0;
      width: 88px;
      border: 2px solid #1e40af;
      border-radius: 6px;
      overflow: hidden;
    }

    .cipher-sidebar-label {
      background: #1e40af;
      color: white;
      text-align: center;
      padding: 7px 2px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cipher-entry {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #bfdbfe;
    }

    .cipher-entry:last-child { border-bottom: none; }

    .cipher-entry .cn {
      width: 36px;
      text-align: center;
      padding: 6px 2px;
      font-size: 14px;
      font-weight: bold;
      color: #1e40af;
      background: #eff6ff;
      border-right: 1px solid #bfdbfe;
      flex-shrink: 0;
    }

    .cipher-entry .cl {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #111;
      padding: 6px 2px;
    }

    /* ── Puzzle area ── */
    .puzzle-area {
      flex: 1;
    }

    .message-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 30px 56px;
      align-items: flex-start;
    }

    .word-group {
      display: flex;
      gap: 6px;
    }

    /* ── Letter boxes ── */
    .letter-box {
      width: 72px;
      border: 2px solid #374151;
      border-radius: 5px;
      overflow: hidden;
      text-align: center;
    }

    .lb-problem {
      background: #f0f9ff;
      border-bottom: 1.5px solid #374151;
      padding: 5px 2px;
      font-size: 14px;
      font-weight: bold;
      color: #111;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-num {
      height: 36px;
      min-height: 36px;
      border-bottom: 1.5px solid #374151;
      background: white;
      overflow: hidden;
    }

    .lb-letter {
      height: 64px;
      min-height: 64px;
      background: #fafafa;
      overflow: hidden;
    }

    /* ── Scale note (screen only) ── */
    .scale-note {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
    }

    /* ── Print ── */
    @media print {
      @page { size: letter portrait; margin: 0.5in; }
      body { background: white; padding: 0; margin: 0; }
      .back-link,
      .form-card,
      .print-row,
      .scale-note { display: none !important; }
      #worksheet {
        display: block !important;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
        max-width: 100%;
        width: 100%;
      }
      .word-group { break-inside: avoid; }
    }
  </style>
</head>
<body>

<a class="back-link" href="/">← Back to Dixie's Page</a>

<!-- ── Input form ── -->
<div class="form-card">
  <h1>Crack the Code!</h1>
  <p>Type a secret phrase to generate a printable math puzzle.</p>

  <label for="phrase-input">Secret phrase</label>
  <div class="form-row">
    <input type="text" id="phrase-input"
           placeholder="e.g. Treasure is in the backyard"
           onkeydown="if(event.key==='Enter') generate()" />
    <button class="btn-generate" onclick="generate()">Generate</button>
  </div>

  <div class="form-optional">
    <div class="form-optional-field">
      <label for="title-input">Puzzle title (optional)</label>
      <input type="text" id="title-input" placeholder="Crack the Code!" />
    </div>
  </div>
</div>

<div class="print-row">
  <button class="btn-print" id="print-btn" onclick="window.print()">Print</button>
</div>

<div id="worksheet"></div>

<script>
function rng(lo, hi) {
  return Math.floor(Math.random() * (hi - lo + 1)) + lo;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rng(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Rules:
//   • Prefer both operands single-digit (1–9)
//   • Fallback: one operand two-digit if target > 18; never both two-digit
//   • No negatives; operands always ≥ 1
function makeProblem(target) {
  const single = [];
  const mixed  = [];

  // Addition: a + b = target
  for (let a = 1; a <= target - 1; a++) {
    const b = target - a;
    if (b < 1) continue;
    if (a <= 9 && b <= 9)      single.push(`${a} + ${b}`);
    else if (a <= 9 || b <= 9) mixed.push(`${Math.min(a,b)} + ${Math.max(a,b)}`);
  }

  // Subtraction: (target + b) - b = target, b single-digit
  for (let b = 1; b <= 9; b++) {
    const a = target + b;
    if (a > 99) break;
    if (a <= 9) single.push(`${a} - ${b}`);
    else        mixed.push(`${a} - ${b}`);
  }

  const pool = single.length ? single : mixed;
  if (!pool.length) return `${target}`;
  shuffle(pool);
  return pool[0];
}

function generate() {
  const raw = document.getElementById('phrase-input').value.trim().toUpperCase();
  if (!raw) { alert('Please enter a secret phrase!'); return; }

  const phrase = raw.split('').filter(c => /[A-Z ]/.test(c)).join('').trim();
  const words  = phrase.split(/\s+/).filter(Boolean);
  if (!words.length) { alert('Phrase must contain letters.'); return; }

  // Scrambled cipher — only letters in this phrase, 1..N
  const uniqueLetters = [...new Set(words.join('').split(''))].sort();
  shuffle(uniqueLetters);

  const letterToNum = {};
  uniqueLetters.forEach((ch, i) => { letterToNum[ch] = i + 1; });

  // Sorted by number for the sidebar display
  const cipherPairs = uniqueLetters.map((ch, i) => [i + 1, ch]).sort((a, b) => a[0] - b[0]);

  const titleVal = document.getElementById('title-input').value.trim() || 'Crack the Code!';

  // ── Cipher sidebar (vertical) ──
  const sidebarHTML = `
    <div class="cipher-sidebar">
      <div class="cipher-sidebar-label">Key</div>
      ${cipherPairs.map(([num, letter]) =>
        `<div class="cipher-entry">
          <span class="cn">${num}</span>
          <span class="cl">${letter}</span>
        </div>`
      ).join('')}
    </div>`;

  // ── Word/letter boxes ──
  const gridHTML = `<div class="message-grid">` +
    words.map(word =>
      `<div class="word-group">` +
      word.split('').map(ch => {
        const num = letterToNum[ch];
        const problem = makeProblem(num);
        return `<div class="letter-box">
          <div class="lb-problem">${problem}</div>
          <div class="lb-num">&nbsp;</div>
          <div class="lb-letter">&nbsp;</div>
        </div>`;
      }).join('') +
      `</div>`
    ).join('') +
  `</div>`;

  document.getElementById('worksheet').innerHTML = `
    <div class="ws-title">${escHtml(titleVal)}</div>
    <div class="ws-body">
      ${sidebarHTML}
      <div class="puzzle-area">${gridHTML}</div>
    </div>`;

  const ws = document.getElementById('worksheet');
  ws.classList.add('visible');
  document.getElementById('print-btn').style.display = 'inline-block';
  fitToPage(ws);
  ws.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Measure content at actual print width, scale down if too tall for one page.
// Uses CSS `zoom` so layout reflows (unlike transform: scale).
function fitToPage(ws) {
  ws.style.zoom = '';

  // Two rAFs: first lets the browser apply the reset, second lets it reflow
  // at the temporarily-narrowed width we use for measurement.
  requestAnimationFrame(() => {
    const PRINT_W = 7.5 * 96;  // 720px — 8.5in minus 0.5in each side
    const PAGE_H  = 10 * 96;   // 960px — 11in minus 0.5in each side

    const savedMax = ws.style.maxWidth;
    ws.style.maxWidth = PRINT_W + 'px';

    requestAnimationFrame(() => {
      const naturalH = ws.scrollHeight;
      ws.style.maxWidth = savedMax;

      let noteEl = document.getElementById('scale-note');
      if (!noteEl) {
        noteEl = document.createElement('div');
        noteEl.id = 'scale-note';
        noteEl.className = 'scale-note';
        ws.after(noteEl);
      }

      if (naturalH > PAGE_H) {
        const scale = PAGE_H / naturalH;
        ws.style.zoom = scale.toFixed(4);
        noteEl.textContent = `Scaled to ${Math.round(scale * 100)}% to fit one page`;
      } else {
        ws.style.zoom = '';
        noteEl.textContent = '';
      }
    });
  });
}
</script>
</body>
</html>
